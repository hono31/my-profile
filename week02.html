<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAKU CAFE メニュー</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100">
    <header class="bg-gray-400 px-20 py-20 text-center">
      <h1 class="text-2xl font-bold text-gray-900">KAKU CAFE</h1>
      <p class="text-gray-600 text-sm mt-3">日本初上陸の表参道コーヒーショップ</p>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-8">
      <section class="mb-8">
        <h2 class="text-xl font-bold text-gray-800 mb-8">drink</h2>

        <div class="bg-white rounded-lg shadow p-6 mb-8 hover:bg-gray-300">
          <h3 class="text-lg font-bold text-gray-900">紅茶</h3>
          <p class="text-gray-600 mt-1">ダージリン・アールグレイ・アッサム</p>
          <p class="text-blue-600 font-bold mt-2 text-lg">650円</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 mb-8 hover:bg-gray-300">
          <h3 class="text-lg font-bold text-gray-900">コーヒー</h3>
          <p class="text-gray-600 mt-1">アメリカン・ブレンド</p>
          <p class="text-blue-600 font-bold mt-2 text-lg">600円</p>
        </div>

          <h2 class="text-xl font-bold text-gray-800 mb-8">cake</h2>

        <div class="bg-white rounded-lg shadow p-6 mb-8 hover:bg-gray-300">
          <h3 class="text-lg font-bold text-gray-900">モンブラン</h3>
          <p class="text-gray-600 mt-1">岐阜県産和栗を贅沢に使用した濃厚な味わい。</p>
          <p class="text-blue-600 font-bold mt-2 text-lg">650円</p>
        </div>
          
        <div class="bg-white rounded-lg shadow p-6 mb-8 hover:bg-gray-300">
          <h3 class="text-lg font-bold text-gray-900">ほうじ茶ロール</h3>
          <p class="text-gray-600 mt-1">ほうじ茶の香り引き立つスポンジとクリームにくるみを使用。</p>
          <p class="text-blue-600 font-bold mt-2 text-lg">700円</p>
        </div>
      </section>
    </main>
    <footer class="bg-gray-400 text-center py-6 text-gray-700 text-sm">
    <h2>笑顔で対応いたします。是非お越しください。お待ちしております。</h2>
      <h3>-KAKU CAFE-</h3></footer>
  </body>
  
</html>
