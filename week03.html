<!DOCTYPE html>

  <body class="bg-gray-200 py-8">

      <div class="flex flex-col md:flex-row gap-8 mx-16">

          <h1 class="text-lg font-bold text-gray-900 mt-3 text-center">ほのか</h1>
          <p class="text-gray-600 text-sm mt-2 text-center">ケーキつぶしちゃった人</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 flex-1 flex-col items-center">

          <p class="text-gray-600 text-sm mt-2 text-center flex flex-col items-center">圧倒的安心感</p>
        </div>

        <div class=" order-last bg-white rounded-lg shadow p-6 flex-1 flex-col items-center 技術的な面で言うと、HTMLの構造（順番）は変えずに、CSS（Tailwind CSSなど）の order-first や flex-col-reverse を使って「スマホの時だけ意図的に順番を入れ替える技術」をちゃんと理解して使いこなせているか、という実装スキルの証明にもなります。">
          <span class="text-4xl flex flex-col items-center">🏀</span>
          <h1 class="text-lg font-bold text-gray-900 mt-3 flex flex-col items-center">しょうた</h1>
          <p class="text-gray-600 text-sm mt-2 text-center">せたかのっぽ</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 flex-1 flex-col items-center">
          <span class="text-4xl flex flex-col items-center">🏀</span>
          <h1 class="text-lg font-bold text-gray-900 mt-3 flex flex-col items-center">たくと</h1>
          <p class="text-gray-600 text-sm mt-2 text-center">zoomユーザー</p>
        </div>
      </div>
    </main>

</html>
