<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自己紹介カード</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 py-8">
    <main class="max-w-4xl mx-auto px-4">
      <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">チームメンバー</h1>

      <!-- カードを横3枚並びにする。スマホでは縦1列 -->
      <div class="flex flex-col md:flex-row gap-6">

        <div class="bg-white rounded-lg shadow p-6 flex-1 flex-col items-center">
          <span class="text-4xl flex flex-col items-center">🐤</span>
          <h2 class="text-lg font-bold text-gray-900 mt-3 text-center">ほのか</h2>
          <p class="text-gray-600 text-sm mt-2 text-center">ケーキつぶしちゃった人</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 flex-1 flex-col items-center">
          <span class="text-4xl flex flex-col items-center">🎶</span>
          <h2 class="text-lg font-bold text-gray-900 mt-3 flex flex-col items-center">みさき</h2>
          <p class="text-gray-600 text-sm mt-2 text-center flex flex-col items-center">圧倒的安心感</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 flex-1 flex-col items-center">
          <span class="text-4xl flex flex-col items-center">🏀</span>
          <h2 class="text-lg font-bold text-gray-900 mt-3 flex flex-col items-center">しょうた</h2>
          <p class="text-gray-600 text-sm mt-2 text-center">せたかのっぽ</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 flex-1 flex-col items-center">
          <span class="text-4xl flex flex-col items-center">🏀</span>
          <h2 class="text-lg font-bold text-gray-900 mt-3 flex flex-col items-center">たくと</h2>
          <p class="text-gray-600 text-sm mt-2 text-center">zoomユーザー</p>
        </div>
      </div>
    </main>
  </body>
</html>
